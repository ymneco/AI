<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spatial Awareness - 3D Viewer</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h1 class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
                    <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
                    <line x1="12" y1="22.08" x2="12" y2="12"/>
                </svg>
                Spatial Viewer
            </h1>
            <button id="sidebar-toggle" class="sidebar-toggle" title="Toggle sidebar">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="15 18 9 12 15 6"/>
                </svg>
            </button>
        </div>

        <!-- Projects List -->
        <div class="sidebar-section">
            <div class="section-title" id="projects-title">
                <span>Projects</span>
                <button id="refresh-projects" class="icon-btn" title="Refresh projects">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="23 4 23 10 17 10"/>
                        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
                    </svg>
                </button>
            </div>
            <div id="projects-list" class="projects-list">
                <div class="loading-indicator">Loading projects...</div>
            </div>
        </div>

        <!-- Stats Panel -->
        <div class="sidebar-section">
            <div class="section-title"><span>Model Info</span></div>
            <div id="stats-panel" class="stats-panel">
                <div class="stat-row">
                    <span class="stat-label">Status</span>
                    <span class="stat-value" id="stat-status">No file loaded</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Type</span>
                    <span class="stat-value" id="stat-type">-</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Vertices</span>
                    <span class="stat-value" id="stat-vertices">-</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Faces</span>
                    <span class="stat-value" id="stat-faces">-</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Has Colors</span>
                    <span class="stat-value" id="stat-colors">-</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Bounding Box</span>
                    <span class="stat-value" id="stat-bbox">-</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">File Size</span>
                    <span class="stat-value" id="stat-filesize">-</span>
                </div>
            </div>
        </div>

        <!-- Controls -->
        <div class="sidebar-section">
            <div class="section-title"><span>Controls</span></div>
            <div class="controls-panel">
                <div class="control-group">
                    <label for="point-size-slider">Point Size</label>
                    <div class="slider-row">
                        <input type="range" id="point-size-slider" min="0.5" max="10" step="0.5" value="2">
                        <span id="point-size-value" class="slider-value">2.0</span>
                    </div>
                </div>
                <div class="control-group">
                    <label for="bg-toggle">Background</label>
                    <div class="toggle-row">
                        <button id="bg-dark" class="toggle-btn active" data-bg="dark">Dark</button>
                        <button id="bg-light" class="toggle-btn" data-bg="light">Light</button>
                    </div>
                </div>
                <div class="control-group">
                    <label>Helpers</label>
                    <div class="toggle-row">
                        <button id="toggle-grid" class="toggle-btn active">Grid</button>
                        <button id="toggle-axes" class="toggle-btn active">Axes</button>
                    </div>
                </div>
                <div class="control-group">
                    <button id="btn-reset-camera" class="action-btn full-width">Reset Camera</button>
                </div>
                <div class="control-group">
                    <button id="btn-fit-view" class="action-btn full-width">Fit to View</button>
                </div>
            </div>
        </div>
    </aside>

    <!-- Collapsed sidebar tab -->
    <button id="sidebar-open" class="sidebar-open-btn" title="Open sidebar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="9 18 15 12 9 6"/>
        </svg>
    </button>

    <!-- Main Viewer -->
    <main id="viewer-container" class="viewer-container">
        <canvas id="viewer-canvas"></canvas>

        <!-- Drop zone overlay -->
        <div id="drop-zone" class="drop-zone hidden">
            <div class="drop-zone-inner">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="17 8 12 3 7 8"/>
                    <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
                <p>Drop PLY file here</p>
            </div>
        </div>

        <!-- Loading overlay -->
        <div id="loading-overlay" class="loading-overlay hidden">
            <div class="loading-spinner"></div>
            <p id="loading-text">Loading...</p>
        </div>

        <!-- Toolbar -->
        <div class="toolbar">
            <span id="filename-display" class="filename-display">No file loaded</span>
        </div>
    </main>

    <!-- Three.js and dependencies via CDN -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
        }
    }
    </script>
    <script type="module" src="/viewer.js"></script>
</body>
</html>
